# configs/final_run.yaml
# Final run: Experiment 3 across all 8 MVTec AD2 categories

device: "cuda"
data_root: "data"
checkpoint_dir: "checkpoints"
results_dir: "results"

backbone: "facebook/dinov3-vitb16-pretrain-lvd1689m"
max_epochs: 50
lr: 1.0e-4
mask_ratio: 0.50
patience: 3               # early stopping patience (epochs without improvement)
num_workers: 2            # parallel category workers
num_gpus: 2
sigma_multipliers: [1, 3, 5, 7, 9, 11, 13, 15]

categories:
  - can
  - fabric
  - fruit_jelly
  - rice
  - sheet_metal
  - vial
  - wallplugs
  - walnuts

seed: 42
