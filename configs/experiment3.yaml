# configs/experiment3.yaml
# Experiment 3: Frozen DINOv3 + Transformer predictor (Latent MAE)

device: "cuda"
data_root: "data"
checkpoint_dir: "experiments/src/experiment_3/checkpoints"
results_dir: "experiments/src/experiment_3/results"

backbone: "facebook/dinov3-vitb16-pretrain-lvd1689m"
epochs: 15
lr: 1.0e-4
mask_ratio: 0.50          # higher ratio forces long-range attention
sigma_multipliers: [1, 3, 5, 7]

# Transformer architecture
embed_dim: 768
num_layers: 4
num_heads: 8

categories:
  - vial
  - sheet_metal

seed: 42
