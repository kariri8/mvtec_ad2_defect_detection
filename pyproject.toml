[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I"]   # pycodestyle, pyflakes, isort
ignore = ["E501"]                # line length handled separately

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["F811"]             # allow fixture redefinition in tests
